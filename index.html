<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СТИЛ 5С - Аудиты</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <style>
    :root {
      --ink: #15251f;
      --muted: #6d7b75;
      --line: #dfe7e2;
      --paper: #ffffff;
      --bg: #f4f7f3;
      --mint: #dff3e7;
      --green: #176b49;
      --green-dark: #0d4b34;
      --orange: #e9792b;
      --orange-soft: #fff0e1;
      --red: #c84b46;
      --red-soft: #ffedeb;
      --blue: #2b6696;
      --blue-soft: #eaf4ff;
      --gold: #a16b00;
      --gold-soft: #fff3c9;
      --shadow: 0 16px 46px rgba(32, 57, 47, .08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .52; transform: none !important; }
    .hidden { display: none !important; }

    .login-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 1.06fr) minmax(420px, .94fr);
      background: #f7faf6;
    }
    .login-hero {
      position: relative;
      overflow: hidden;
      padding: 44px 6vw;
      background:
        radial-gradient(circle at 83% 17%, rgba(245, 175, 82, .34), transparent 27%),
        radial-gradient(circle at 15% 82%, rgba(87, 163, 119, .28), transparent 34%),
        linear-gradient(145deg, #0d4432, #176b49 56%, #1d7c57);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .login-hero::after {
      content: "";
      position: absolute;
      right: -110px;
      bottom: -110px;
      width: 400px;
      height: 400px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 50%;
      box-shadow: 0 0 0 55px rgba(255,255,255,.035), 0 0 0 110px rgba(255,255,255,.025);
    }
    .brand {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      align-items: center;
      font-weight: 800;
      letter-spacing: .06em;
      font-size: 14px;
    }
    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 15px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
    }
    .brand-mark svg { width: 22px; height: 22px; }
    .hero-copy { position: relative; z-index: 1; max-width: 610px; padding: 46px 0; }
    .hero-kicker {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      padding: 7px 11px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.11);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .hero-copy h1 {
      max-width: 580px;
      margin: 20px 0 14px;
      font-size: clamp(42px, 6vw, 74px);
      letter-spacing: -.075em;
      line-height: .98;
    }
    .hero-copy p {
      max-width: 560px;
      margin: 0;
      color: rgba(255,255,255,.78);
      font-size: 18px;
      line-height: 1.65;
    }
    .hero-features {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hero-feature {
      display: flex;
      gap: 8px;
      align-items: center;
      color: rgba(255,255,255,.84);
      font-size: 13px;
    }
    .hero-feature span {
      display: grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      color: white;
    }
    .login-side {
      display: grid;
      place-items: center;
      padding: 42px;
    }
    .login-card {
      width: min(100%, 460px);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255,255,255,.92);
      box-shadow: var(--shadow);
    }
    .login-card h2 { margin: 0 0 8px; font-size: 28px; letter-spacing: -.04em; }
    .login-card p { margin: 0 0 24px; color: var(--muted); font-size: 14px; line-height: 1.55; }
    .field-label { display: block; margin-bottom: 7px; color: #496058; font-size: 12px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    .code-input {
      width: 100%;
      height: 58px;
      padding: 0 16px;
      border: 1px solid #cddad3;
      border-radius: 14px;
      outline: none;
      color: var(--ink);
      background: white;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .14em;
      text-align: center;
      text-transform: uppercase;
      transition: .2s ease;
    }
    .code-input:focus { border-color: var(--green); box-shadow: 0 0 0 4px rgba(23,107,73,.12); }
    .shared-input {
      width: 100%;
      height: 48px;
      margin-bottom: 11px;
      padding: 0 14px;
      border: 1px solid #cddad3;
      border-radius: 12px;
      outline: none;
      color: var(--ink);
      background: white;
      font-size: 15px;
    }
    .shared-input:focus { border-color: var(--green); box-shadow: 0 0 0 4px rgba(23,107,73,.1); }
    .shared-note { margin: 12px 0 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .service-login { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); }
    .service-login summary { cursor: pointer; color: var(--muted); font-size: 12px; font-weight: 750; }
    .service-login form { margin-top: 13px; }
    .login-separator { display: flex; gap: 10px; align-items: center; margin: 22px 0; color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    .login-separator::before, .login-separator::after { content: ""; height: 1px; flex: 1; background: var(--line); }
    .primary-btn, .secondary-btn, .ghost-btn, .danger-btn {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 12px;
      padding: 0 16px;
      border: 1px solid transparent;
      font-weight: 750;
      font-size: 14px;
      transition: .18s ease;
    }
    .primary-btn { background: var(--green); color: white; }
    .primary-btn:hover { background: var(--green-dark); transform: translateY(-1px); }
    .secondary-btn { border-color: #cfe1d8; background: var(--mint); color: var(--green-dark); }
    .secondary-btn:hover { border-color: #add1bd; background: #d2edde; }
    .ghost-btn { border-color: var(--line); background: white; color: var(--ink); }
    .ghost-btn:hover { border-color: #bfd0c7; background: #f8fbf9; }
    .danger-btn { border-color: #f4c4c0; background: var(--red-soft); color: #a33b37; }
    .danger-btn:hover { border-color: #e9a7a2; }
    .full-btn { width: 100%; margin-top: 14px; }
    .login-error {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--red-soft);
      color: #a33b37;
      font-size: 13px;
      font-weight: 650;
    }
    .demo-box { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--line); }
    .demo-title { margin-bottom: 10px; color: var(--muted); font-size: 12px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; }
    .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .demo-code {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: white;
      color: var(--ink);
      font-size: 12px;
      text-align: left;
    }
    .demo-code:hover { border-color: #b3cdc0; background: #f8fcf9; }
    .demo-code b { display: block; margin-bottom: 3px; color: var(--green); font-size: 13px; letter-spacing: .04em; }

    .app-shell { min-height: 100vh; display: grid; grid-template-columns: 248px 1fr; }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 22px 16px 16px;
      background: var(--green-dark);
      color: white;
    }
    .sidebar .brand { padding: 2px 7px 26px; }
    .nav { display: grid; gap: 5px; }
    .nav-btn {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 11px;
      padding: 11px 12px;
      border: 0;
      border-radius: 11px;
      background: transparent;
      color: rgba(255,255,255,.65);
      font-size: 14px;
      text-align: left;
      transition: .16s ease;
    }
    .nav-btn svg { width: 18px; height: 18px; }
    .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,.12); color: white; }
    .nav-btn.active { font-weight: 760; }
    .sidebar-bottom { margin-top: auto; }
    .profile-mini {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 7px;
      border-top: 1px solid rgba(255,255,255,.13);
    }
    .avatar {
      display: grid;
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 13px;
      background: #f3c977;
      color: #5d4109;
      font-size: 13px;
      font-weight: 850;
    }
    .profile-mini b { display: block; max-width: 145px; overflow: hidden; color: white; font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
    .profile-mini span { display: block; margin-top: 3px; color: rgba(255,255,255,.56); font-size: 11px; }
    .logout-btn {
      display: flex;
      width: 100%;
      gap: 9px;
      align-items: center;
      padding: 10px 9px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: rgba(255,255,255,.58);
      font-size: 13px;
    }
    .logout-btn:hover { background: rgba(255,255,255,.09); color: white; }
    .logout-btn svg { width: 17px; height: 17px; }

    .main { min-width: 0; padding: 28px 34px 42px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      margin-bottom: 26px;
    }
    .topbar h1 { margin: 0; font-size: 30px; letter-spacing: -.055em; }
    .topbar p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .top-actions { display: flex; gap: 9px; }
    .icon-btn {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      color: var(--ink);
    }
    .icon-btn svg { width: 18px; height: 18px; }
    .content { max-width: 1420px; margin: 0 auto; }
    .hero-card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(210px, .4fr);
      overflow: hidden;
      margin-bottom: 18px;
      padding: 25px 26px;
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 88% 20%, rgba(255,220,156,.65), transparent 23%),
        linear-gradient(125deg, #e2f4e6 0%, #eef8ed 58%, #fff4da 100%);
      border: 1px solid #d8e7da;
    }
    .hero-card h2 { margin: 8px 0 8px; font-size: 26px; letter-spacing: -.045em; }
    .hero-card p { max-width: 680px; margin: 0; color: #587167; font-size: 14px; line-height: 1.6; }
    .hero-badge {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      width: fit-content;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.68);
      color: var(--green-dark);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .hero-score { display: grid; place-content: center; text-align: right; }
    .hero-score strong { display: block; font-size: 48px; letter-spacing: -.09em; line-height: 1; }
    .hero-score span { display: block; margin-top: 5px; color: #678076; font-size: 12px; font-weight: 750; text-transform: uppercase; letter-spacing: .08em; }

    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 13px; margin-bottom: 18px; }
    .metric, .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper);
      box-shadow: 0 5px 22px rgba(37,66,54,.035);
    }
    .metric { padding: 16px; }
    .metric-head { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 12px; font-weight: 750; }
    .metric-icon { display: grid; width: 32px; height: 32px; place-items: center; border-radius: 10px; background: var(--mint); color: var(--green); }
    .metric-icon.warn { background: var(--orange-soft); color: var(--orange); }
    .metric-icon.blue { background: var(--blue-soft); color: var(--blue); }
    .metric-icon.gold { background: var(--gold-soft); color: var(--gold); }
    .metric-icon svg { width: 16px; height: 16px; }
    .metric-value { margin-top: 8px; font-size: 29px; font-weight: 850; letter-spacing: -.06em; }
    .metric-note { margin-top: 4px; color: var(--muted); font-size: 12px; }
    .grid-2 { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(270px, .65fr); gap: 18px; }
    .panel { padding: 18px; }
    .panel + .panel { margin-top: 14px; }
    .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 14px; }
    .panel-head h3 { margin: 0; font-size: 17px; letter-spacing: -.025em; }
    .panel-head p { margin: 5px 0 0; color: var(--muted); font-size: 12px; }
    .small-link { border: 0; background: transparent; color: var(--green); font-size: 13px; font-weight: 750; }

    .task-list { display: grid; gap: 10px; }
    .task-card {
      display: grid;
      grid-template-columns: 43px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      transition: .18s ease;
    }
    .task-card:hover { border-color: #bdd5c9; box-shadow: 0 8px 20px rgba(31,93,67,.07); transform: translateY(-1px); }
    .task-symbol { display: grid; width: 43px; height: 43px; place-items: center; border-radius: 12px; background: var(--mint); color: var(--green); }
    .task-symbol svg { width: 20px; height: 20px; }
    .task-symbol.orange { background: var(--orange-soft); color: var(--orange); }
    .task-symbol.blue { background: var(--blue-soft); color: var(--blue); }
    .task-symbol.red { background: var(--red-soft); color: var(--red); }
    .task-title { overflow: hidden; font-size: 14px; font-weight: 800; text-overflow: ellipsis; white-space: nowrap; }
    .task-sub { display: flex; gap: 7px; align-items: center; margin-top: 5px; color: var(--muted); font-size: 12px; }
    .dot { width: 4px; height: 4px; border-radius: 50%; background: #a9b8b1; }
    .task-action { min-width: 108px; }
    .status {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      width: fit-content;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .status.todo { background: var(--blue-soft); color: var(--blue); }
    .status.draft { background: var(--orange-soft); color: #ad591e; }
    .status.review { background: var(--gold-soft); color: #946200; }
    .status.accepted { background: var(--mint); color: var(--green); }
    .status.returned { background: var(--red-soft); color: var(--red); }
    .status.actioned { background: var(--blue-soft); color: var(--blue); }
    .bitrix-note { margin-top: 7px; color: var(--blue); font-size: 12px; font-weight: 750; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-chip {
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }
    .filter-chip.active { border-color: #b9d8c8; background: var(--mint); color: var(--green-dark); }
    .progress-track { height: 8px; overflow: hidden; border-radius: 99px; background: #e7eee9; }
    .progress-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, #1b754f, #55a975); }
    .progress-caption { display: flex; justify-content: space-between; margin-top: 8px; color: var(--muted); font-size: 12px; }
    .legend { display: grid; gap: 11px; margin-top: 16px; }
    .legend-row { display: grid; grid-template-columns: 10px 1fr auto; gap: 8px; align-items: center; font-size: 12px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); }
    .legend-dot.orange { background: var(--orange); }
    .legend-dot.blue { background: var(--blue); }
    .legend-row span { color: var(--muted); }

    .page-title-row { display: flex; justify-content: space-between; gap: 14px; align-items: flex-end; margin-bottom: 16px; }
    .page-title-row h2 { margin: 0; font-size: 22px; letter-spacing: -.04em; }
    .page-title-row p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .search {
      width: 260px;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 11px;
      outline: none;
      background: white;
      color: var(--ink);
      font-size: 13px;
    }
    .search:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(23,107,73,.1); }

    .review-card {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
    }
    .review-card + .review-card { margin-top: 9px; }
    .review-card h4 { margin: 0; font-size: 14px; }
    .review-meta { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 7px; color: var(--muted); font-size: 12px; }
    .review-actions { display: flex; gap: 7px; align-items: center; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px 9px; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 11px; letter-spacing: .055em; text-align: left; text-transform: uppercase; }
    td { padding: 11px 9px; border-bottom: 1px solid #edf1ee; vertical-align: middle; }
    tr:last-child td { border-bottom: 0; }
    .person { display: flex; gap: 9px; align-items: center; }
    .person .avatar { width: 34px; height: 34px; border-radius: 11px; font-size: 11px; }
    .person b { display: block; font-size: 13px; }
    .person span { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; }
    .role-toggle {
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .role-toggle.on { border-color: #ead08a; background: var(--gold-soft); color: var(--gold); }
    .room-edit-btn { white-space: nowrap; padding: 7px 11px; font-size: 12px; }
    .room-editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0; }
    .room-editor-grid .full { grid-column: 1 / -1; }
    .room-editor-grid label { display: block; color: var(--muted); font-size: 12px; font-weight: 750; margin-bottom: 6px; }
    .room-editor-grid input, .room-editor-grid select { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px 11px; background: white; color: var(--ink); }
    .check-list { max-height: 220px; overflow: auto; border: 1px solid var(--line); border-radius: 10px; padding: 6px; background: #fbfcfb; }
    .check-item { display: flex; align-items: center; gap: 9px; padding: 7px 6px; border-radius: 7px; font-size: 13px; cursor: pointer; }
    .check-item:hover { background: #f0f6f3; }
    .check-item input { width: auto; }

    .audit-layout { display: grid; grid-template-columns: minmax(0, 1fr) 270px; gap: 18px; }
    .quick-audit {
      max-width: 760px;
      margin: 42px auto;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: white;
      box-shadow: 0 10px 30px rgba(37,66,54,.05);
    }
    .quick-audit h2 { margin: 8px 0 6px; font-size: 24px; letter-spacing: -.04em; }
    .quick-audit p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.55; }
    .quick-audit-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 22px; }
    .quick-audit-actions button { min-height: 62px; font-size: 16px; }
    .audit-head {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
    }
    .audit-head-top { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .audit-head h2 { margin: 6px 0 5px; font-size: 22px; letter-spacing: -.045em; }
    .audit-head p { margin: 0; color: var(--muted); font-size: 13px; }
    .audit-score {
      display: grid;
      width: 70px;
      height: 70px;
      flex: 0 0 auto;
      place-content: center;
      border-radius: 20px;
      background: var(--mint);
      color: var(--green-dark);
      text-align: center;
    }

        item.returnComment = row.return_comment || "";
        if (row.bitrix_task_id) item.bitrixTask = { id: row.bitrix_task_id };
        if (row.accepted_at) item.acceptedAt = row.accepted_at;
        auditById.set(row.id, item);
      });
      answerRows.forEach(row => {
        const item = auditById.get(row.audit_id);
        if (!item) return;
        item.answers[row.question_key] = { score: row.score, note: row.note || "" };
      });
      session = user(profile.staff_id);
      if (!session) throw new Error("Сотрудник отключён в справочнике");
      sharedMode = true;
      persist();
    }

      saveSupabaseSession(authSession);
      return authSession;

      const issues = [];
      if (!room.periodicity) issues.push("Не указана периодичность");
      if (!room.responsible) issues.push("Не указан ответственный");
      if (!room.responsibleBitrixId) issues.push("Не сопоставлен пользователь Битрикс24");
      if (!roomAuditorIds(room).length) issues.push("Не назначен проверяющий");
      if (!room.chiefId) issues.push("Не назначен главный аудитор");
      return issues;
    }
    function roomStats() {
      return {
        missingPeriodicity: state.rooms.filter(room => !room.periodicity).length,
        missingResponsible: state.rooms.filter(room => !room.responsible).length,
        missingBitrixMapping: state.rooms.filter(room => !room.responsibleBitrixId).length,
        missingAuditor: state.rooms.filter(room => !roomAuditorIds(room).length).length
      };
    }
    function syncTasksFromRooms() {
      const desired = new Map();
      state.rooms.forEach(room => {
        roomAuditorIds(room).forEach(auditorId => {
          const fresh = buildTask(room, auditorId);
          desired.set(fresh.id, fresh);
        });
      });
      const retained = [];
      state.tasks.forEach(existing => {
        const fresh = desired.get(existing.id);
        if (fresh) {
          if (existing.periodKey !== fresh.periodKey) {
            Object.assign(existing, fresh);
          } else {
            Object.assign(existing, {
              responsibleBitrixId: fresh.responsibleBitrixId,
              responsibleName: fresh.responsibleName,
              ownerChief: fresh.ownerChief,
              room: fresh.room,
              number: fresh.number,
              type: fresh.type,
              periodicity: fresh.periodicity,
              due: fresh.due
            });
          }
          retained.push(existing);
          desired.delete(existing.id);
        } else if (existing.status !== "todo" || Object.keys(existing.answers || {}).length) {
          retained.push(existing);
        }
      });
      state.tasks = [...retained, ...desired.values()];
    }

      await supabaseRequest(`rooms?id=eq.${encodeURIComponent(room.id)}`, {
        method: "PATCH",

          source_row: room.sourceRow,
          source_object: room.sourceObject,
          number: room.number,
          name: room.name,
          checklist: room.checklist,
          periodicity: room.periodicity || null,
          responsible_name: room.responsible || null,
          responsible_bitrix_id: room.responsibleBitrixId ? Number(room.responsibleBitrixId) : null,
          chief_staff_id: room.chiefId || null,
          issues: room.issues
        }
      });
      await supabaseRequest(`room_auditors?room_id=eq.${encodeURIComponent(room.id)}`, { method: "DELETE" });
      const assignments = roomAuditorIds(room).map(auditorId => ({
        room_id: room.id,
        auditor_staff_id: auditorId,
        is_required: false
      }));
      if (assignments.length) await supabaseRequest("room_auditors", { method: "POST", body: assignments });

        auditorStaffId: t.auditorId,
        auditKind: t.auditKind || "route",

        score: taskScore(t),
        returnComment: t.returnComment || "",
        bitrixTaskId: t.bitrixTask?.id ? String(t.bitrixTask.id) : null,
        acceptedAt: t.acceptedAt || null,

        <article class="task-card">
          <div class="task-symbol ${room.checklist === "Офис" ? "blue" : room.checklist === "Транспорт" ? "orange" : ""}">${typeIcon(room.checklist)}</div>
          <div>
            <div class="task-title">${esc(room.name)} <span style="color:#8a9892;font-weight:650">· ${esc(room.number || room.sourceObject)}</span></div>
            <div class="task-sub"><span>${esc(room.checklist)}</span><i class="dot"></i><span>${esc(periodicityLabel(room.periodicity))}</span>${t ? `<i class="dot"></i>${statusBadge(t.status)}` : ""}</div>
          </div>
          <div class="task-action">
            <button class="${completed ? "ghost-btn" : "primary-btn"}" onclick="startControlAudit('${room.id}')">${completed ? "Пройти ещё раз" : "Начать"} ${icons.arrow}</button>
          </div>
        </article>`;
    }

    function renderAudit() {
      const t = task(auditTaskId);
      if (!t) { view = "tasks"; return renderTasks(); }
      if (quickAuditPrompt && isDirectAudit(t)) return renderQuickSapronovAudit(t);
      const sections = checklistForTask(t);
      const totalQuestions = checklistQuestionCount(sections);
      if (auditStep >= sections.length) auditStep = sections.length - 1;
      const section = sections[auditStep];
      const score = taskScore(t);
      const answered = Object.keys(t.answers || {}).length;
      const missingNotes = hasMissingNotes(t);
      return `
        <section class="audit-layout">
          <div>
            <div class="audit-head">
              <div class="audit-head-top">
                <div>
                  <button class="small-link" onclick="setView('tasks')">← Назад к маршруту</button>
                  <h2>${esc(t.room)} · ${esc(t.number)}</h2>
                  <p>${esc(t.type)} · ${esc(t.periodicity)} · ${esc(t.due)}</p>
                </div>
                <div class="audit-score"><b>${score}</b><span>из 50</span></div>
              </div>
              ${t.status === "returned" ? `<div class="return-note"><b>Комментарий главного аудитора:</b><br>${esc(t.returnComment)}</div>` : ""}
            </div>
            <div class="step-strip">${sections.map((s, i) => `<button class="step-tab ${i === auditStep ? "active" : ""} ${sectionDone(t, s) ? "done" : ""}" onclick="setAuditStep(${i})">${s.short}</button>`).join("")}</div>
            <div class="panel">
              <div class="panel-head"><div><h3>${section.title}</h3><p>${section.description}</p></div><button class="ghost-btn" onclick="fillSectionWithTwo('${t.id}','${section.key}')">${icons.check} Поставить 2 по всему разделу</button></div>
              ${section.questions.map((q, index) => renderQuestion(t, section, q, index)).join("")}
              <div class="audit-footer">
                <button class="ghost-btn" onclick="saveDraft()">${icons.clipboard} Сохранить черновик</button>
                <div>
                  ${auditStep > 0 ? `<button class="ghost-btn" onclick="setAuditStep(${auditStep - 1})">Назад</button>` : ""}
                  ${auditStep < sections.length - 1 ? `<button class="primary-btn" onclick="setAuditStep(${auditStep + 1})">Далее ${icons.arrow}</button>` : `<button class="primary-btn" onclick="submitAudit()" ${answered < totalQuestions || missingNotes ? "disabled" : ""}>${isDirectAudit(t) && issueList(t).length ? "Завершить аудит" : "Завершить аудит"} ${icons.check}</button>`}
                </div>
              </div>
            </div>
          </div>
          <aside>
            <div class="side-note">
              <h4>Прогресс проверки</h4>
              <div class="progress-track"><div class="progress-fill" style="width:${answered / totalQuestions * 100}%"></div></div>
              <div class="progress-caption"><span>Заполнено</span><b>${answered} / ${totalQuestions}</b></div>
            </div>
            <div class="side-note">
              <h4>Как оценивать</h4>
              <ul><li><b>2</b> — соответствует</li><li><b>1</b> — частично</li><li><b>0</b> — не соответствует</li></ul>
              <p>При оценке 0 или 1 кратко опишите замечание. Фото можно приложить по желанию.</p>
            </div>
            <div class="side-note">
              <h4>Фото к проверке</h4>
              <p>Необязательно. До 5 фото. При создании задачи фотографии будут приложены к ней автоматически.</p>
              <input class="file-input" type="file" accept="image/*" multiple onchange="rememberFiles('${t.id}', this.files)">
              ${t.files?.length ? `<p><b>Добавлено файлов:</b> ${t.files.length}<br>${t.files.map(file => esc(file.name || file)).join("<br>")}</p>` : ""}
            </div>
          </aside>
        </section>`;
    }
    function renderQuickSapronovAudit(t) {
      return `
        <section class="quick-audit">
          <button class="small-link" onclick="setView('${t.auditKind === "control" ? "control" : "tasks"}')">← Назад к маршруту</button>
          <h2>${esc(t.room)} · ${esc(t.number)}</h2>
          <p>${esc(t.type)} · ${esc(t.periodicity)} · ${esc(t.due)}</p>
          <div class="quick-audit-actions">
            <button class="primary-btn" onclick="completeAuditWithoutIssues('${t.id}')">${icons.check} Замечаний нет</button>
            <button class="ghost-btn" onclick="openSapronovChecklist()">Есть замечание ${icons.arrow}</button>
          </div>
        </section>`;
    }
    function renderQuestion(t, section, question, index) {
      const key = `${section.key}-${index}`;
      const value = (t.answers || {})[key] || {};
      return `
        <div class="question">
          <div class="question-title"><span class="question-num">${index + 1}</span><span>${esc(question)}</span></div>
          <div class="score-buttons">
            ${scoreChoice(t.id, key, 0, "0 · Не соответствует", value.score)}
            ${scoreChoice(t.id, key, 1, "1 · Частично", value.score)}
            ${scoreChoice(t.id, key, 2, "2 · Соответствует", value.score)}
          </div>
          ${value.score === 0 || value.score === 1 ? `<textarea class="note-box" placeholder="Что именно нужно исправить?" oninput="setNote('${t.id}','${key}',this.value)">${esc(value.note || "")}</textarea><div class="question-hint">Для оценки ${value.score} укажите замечание</div>` : ""}
        </div>`;
    }
    function scoreChoice(taskId, key, score, text, selected) {
      return `<button class="score-choice ${selected === score ? `sel-${score}` : ""}" onclick="setScore('${taskId}','${key}',${score})">${score === 2 ? icons.check : score === 0 ? icons.x : "◐"} ${text}</button>`;
    }
    function taskScore(t) {
      return Object.values(t.answers || {}).reduce((sum, x) => sum + (Number.isFinite(x.score) ? x.score : 0), 0);
    }
    function sectionDone(t, section) {
      return section.questions.every((_, index) => Number.isFinite(t.answers?.[`${section.key}-${index}`]?.score));
    }
    function hasMissingNotes(t) {
      return Object.values(t.answers || {}).some(x => (x.score === 0 || x.score === 1) && !String(x.note || "").trim());
    }
    function issueList(t) {
      const sections = checklistForTask(t);
      return Object.entries(t.answers || {}).flatMap(([key, answer]) => {
        if (answer.score !== 0 && answer.score !== 1) return [];
        const [sectionKey, rawIndex] = key.split("-");
        const section = sections.find(item => item.key === sectionKey);
        const question = section?.questions[Number(rawIndex)] || key;
        return [{ question, score: answer.score, note: answer.note || "Без пояснения" }];
      });
    }
    function isSapronovOwnAudit(t) {
      return session?.id === "u2" && t.auditorId === "u2";
    }
    function isDirectAudit(t) {
      return true;
    }

    function renderReview() {
      const tasks = visibleTasks().filter(t => t.status === "review" && (session.role === "admin" || t.ownerChief === session.id));
      return `
        <section class="page-title-row">
          <div><h2>Ожидают вашего решения</h2><p>Ответы аудитора доступны для просмотра, но не для редактирования.</p></div>
        </section>
        <section class="metrics">
          ${metric("На согласовании", tasks.length, "проверок ожидают решения", icons.review, "gold")}
          ${metric("Средний результат", averageScore(tasks) || "—", "баллов из 50", icons.chart, "")}
          ${metric("С замечаниями", tasks.filter(t => taskScore(t) < 50).length, "требуют решения", icons.flag, "warn")}
          ${metric("Главных аудиторов", state.users.filter(u => u.role === "chief").length, "назначено", icons.shield, "blue")}
        </section>
        <section class="panel">
          <div class="panel-head"><div><h3>Проверки на согласовании</h3><p>Примите результат или верните с обязательным комментарием</p></div></div>
          ${tasks.map(renderReviewCard).join("") || `<div class="empty">Новых проверок на согласование нет</div>`}
        </section>`;
    }
    function renderReviewCard(t) {
      const auditor = user(t.auditorId);

      return `
        <article class="review-card">
          <div>
            <h4>${esc(t.room)} · ${esc(t.number)}</h4>
            <div class="review-meta">
              <span>${esc(auditor.name)}</span><i class="dot"></i><span>${esc(t.type)}</span><i class="dot"></i><b>${taskScore(t)} / 50</b><i class="dot"></i><span>${issues} замеч.</span>
            </div>
          </div>
          <div class="review-actions">
            <button class="danger-btn" onclick="openReturnModal('${t.id}')">Вернуть и создать задачу</button>
            <button class="primary-btn" onclick="acceptTask('${t.id}')">${icons.check} Принять</button>
          </div>
        </article>`;
    }

    function renderReports() {
      const tasks = visibleTasks();
      const accepted = tasks.filter(t => ["accepted", "actioned"].includes(t.status));
      const issues = tasks.reduce((sum, t) => sum + Object.values(t.answers || {}).filter(a => a.score < 2).length, 0);
      const comparisonRows = buildComparisonRows().filter(row => row.periodKey === scheduleFor(row.room.periodicity).periodKey);
      return `
        <section class="page-title-row">
          <div><h2>Сводка за ${PERIOD_MONTH}</h2><p>Оценки закреплённых аудиторов и контрольные обходы главных аудиторов.</p></div>
          <button class="primary-btn" onclick="exportYearExcel()">${icons.download} Выгрузить годовой Excel</button>
        </section>
        <section class="metrics">
          ${metric("Принято", accepted.length, "завершённых проверок", icons.check, "")}
          ${metric("Средний балл", averageScore(accepted) || "—", "из максимальных 50", icons.chart, "blue")}
          ${metric("Замечания", issues, "для корректирующих действий", icons.flag, "warn")}
          ${metric("Выполнение", tasks.length ? Math.round(accepted.length / tasks.length * 100) + "%" : "0%", "плана на период", icons.clipboard, "gold")}
        </section>
        <section class="grid-2">
          <div class="panel">
            <div class="panel-head"><div><h3>Результаты по объектам</h3><p>Принятые и ожидающие согласования проверки</p></div></div>
            <div class="table-wrap">
              <table><thead><tr><th>Объект</th><th>Аудитор</th><th>Оценка аудитора</th><th>Контрольная оценка</th><th>КПЭ, %</th><th>Статус</th></tr></thead>
              <tbody>${comparisonRows.map(row => `<tr><td><b>${esc(row.room.name)}</b><br><span style="color:var(--muted)">${esc(row.room.number || row.room.sourceObject)}</span></td><td>${esc(user(row.auditorId)?.name.split(" ").slice(0,2).join(" ") || row.auditorId)}</td><td><b>${row.routeScore ?? "—"}</b></td><td>${row.controlScore ?? "—"}${row.controlAuditor ? `<br><span style="color:var(--muted)">${esc(row.controlAuditor)}</span>` : ""}</td><td><b>${row.matchPercent === null ? "—" : row.matchPercent + "%"}</b></td><td>${esc(row.routeStatus)}</td></tr>`).join("")}</tbody></table>
            </div>

          <div class="panel">
            <div class="panel-head"><div><h3>Периодичность</h3><p>Расписание аудитов</p></div></div>
            <div class="legend">
              ${legend("ПР + Склад", "еженедельно", "")}
              ${legend("Офис", "ежемесячно", "blue")}
              ${legend("Прочие помещения", "ежемесячно", "orange")}
              ${legend("Транспорт", "ежемесячно", "")}
              ${legend("Корректирующие действия", issues, "orange")}
            </div>
          </div>
        </section>`;
    }

    function renderAdmin() {
      const filteredRooms = state.rooms.filter(r => `${r.number} ${r.name} ${r.sourceObject} ${r.checklist} ${r.responsible}`.toLowerCase().includes(roomSearch.toLowerCase()));
      const unresolved = state.rooms.filter(r => r.issues.length);
      const stats = roomStats();
      return `
        <section class="metrics">
          ${metric("Сотрудники", state.users.length - 1, "учётных записей", icons.users, "")}
          ${metric("Главные аудиторы", state.users.filter(u => u.role === "chief").length, "назначено", icons.shield, "gold")}
          ${metric("Объекты", state.rooms.length, "помещения и транспорт", icons.building, "blue")}

          </div>
          <div class="table-wrap">
            <table><thead><tr><th>Номер</th><th>Помещение</th><th>Чек-лист</th><th>Периодичность</th><th>Кто проверяет</th><th>Ответственный</th><th>Главный аудитор</th><th>Статус</th><th></th></tr></thead>

        document.getElementById("loginError").innerHTML = `<div class="login-error">Код не найден. Проверьте ввод или выберите демо-вход.</div>`;

      view = "dashboard";
      render();

      const errorBox = document.getElementById("sharedLoginError");

      try {
        const { session: authSession } = await callStaffCodeAuth({
          action: "admin-login",
          email: document.getElementById("sharedEmail").value.trim(),
          password: document.getElementById("sharedPassword").value
        });
        await activateSharedSession(authSession);

        saveSupabaseSession(null);
        errorBox.innerHTML = `<div class="login-error">${esc(error.message)}</div>`;

      event.preventDefault();
      const errorBox = document.getElementById("sharedCodeLoginError");
      errorBox.innerHTML = "";
      try {
        const result = await callStaffCodeAuth({
          action: "login",
          code: document.getElementById("sharedCode").value.trim().toUpperCase()
        });
        await activateSharedSession(result.session);
      } catch (error) {
        saveSupabaseSession(null);
        errorBox.innerHTML = `<div class="login-error">${esc(error.message)}</div>`;

            <div class="check-list">${state.users.filter(item => item.role !== "admin").map(item => `<label class="check-item"><input type="checkbox" name="roomAuditor" value="${item.id}" ${auditorIds.includes(item.id) ? "checked" : ""}> <span>${esc(item.name)}</span></label>`).join("")}</div>
          </div>

      const lastDay = new Date(year, monthIndex + 1, 0).getDate();
      for (let day = 1; day <= lastDay; day++) {
        const date = new Date(year, monthIndex, day, 12);
        const anchor = weekAnchor(date);
        const key = weekPeriodKey(date);
        if (anchor.getFullYear() === year && anchor.getMonth() === monthIndex && !keys.includes(key)) keys.push(key);
      }
      return keys;
    }
    function reportPeriod(room, auditorId, periodKey) {
      const route = auditResult(room.id, auditorId, periodKey, "route");
      const control = controlResult(room.id, periodKey);
      const routeScore = scoreOrNull(route);
      const controlScore = scoreOrNull(control);
      const controlAuditor = control ? user(control.auditor_staff_id || control.auditorId)?.name || "" : "";
      const currentKey = isWeekly(room.periodicity) ? weekPeriodKey() : monthPeriodKey();
      const missed = periodKey < currentKey && routeScore === null;
      const planned = periodKey >= currentKey && routeScore === null;
      const notes = [...Object.values(route?.answers || {}), ...Object.values(control?.answers || {})]
        .map(answer => answer.note)
        .filter(Boolean)
        .join(" | ");
      return {
        routeScore,
        controlScore,
        controlAuditor,
        controlValue: Number.isFinite(controlScore) ? `${controlScore}${controlAuditor ? ` - ${controlAuditor.split(" ")[0]}` : ""}` : "",
        kpi: matchingPercent(routeScore, controlScore),
        routeValue: routeScore ?? (missed ? "Не пройден" : planned ? "Запланировано" : ""),
        missed,
        notes
      };
    }
    function reportRowsForMonth(year, monthIndex) {
      const weeks = monthWeekKeys(year, monthIndex);
      const monthKey = `${year}-${pad2(monthIndex + 1)}`;
      const rows = [];
      state.rooms.forEach(room => roomAuditorIds(room).forEach(auditorId => {
        const base = [
          room.name,
          room.number || room.sourceObject,
          room.checklist,
          periodicityLabel(room.periodicity),
          user(auditorId)?.name || auditorId
        ];
        const weeklyCells = [];
        let monthlyCells = ["", "", ""];
        let missed = 0;
        const notes = [];
        if (isWeekly(room.periodicity)) {
          weeks.forEach(periodKey => {
            const result = reportPeriod(room, auditorId, periodKey);
            weeklyCells.push(result.routeValue, result.controlValue, result.kpi ?? "");
            if (result.missed) missed++;
            if (result.notes) notes.push(result.notes);
          });
        } else {
          weeks.forEach(() => weeklyCells.push("", "", ""));
          const result = reportPeriod(room, auditorId, monthKey);
          monthlyCells = [result.routeValue, result.controlValue, result.kpi ?? ""];
          if (result.missed) missed++;
          if (result.notes) notes.push(result.notes);
        }
        rows.push([...base, ...weeklyCells, ...monthlyCells, missed || "", notes.join(" | ")]);
      }));
      return { weeks, rows };
    }
    function sheetFromRows(rows, widths, merges = [], colors = []) {
      const sheet = XLSX.utils.aoa_to_sheet(rows);
      sheet["!cols"] = widths.map(width => ({ wch: width }));
      sheet["!merges"] = merges;
      if (rows.length > 3) sheet["!autofilter"] = { ref: XLSX.utils.encode_range({ s: { r: 2, c: 0 }, e: { r: rows.length - 1, c: rows[2].length - 1 } }) };
      (colors || []).forEach(({ r, c, rgb }) => {
        const ref = XLSX.utils.encode_cell({ r, c });
        if (!sheet[ref]) sheet[ref] = { t: "s", v: "" };
        sheet[ref].s = { fill: { patternType: "solid", fgColor: { rgb } } };
      });
      return sheet;
    }
    function annualSummaryRows(year) {
      const headers = ["Помещение", "Номер", "Тип", "Периодичность", "Аудитор", ...REPORT_MONTHS, "Средний балл за год", "Средняя контрольная оценка", "Средний КПЭ, %", "Пропуски"];
      const rows = [[`Годовая сводка аудитов 5С за ${year} год`], [], headers];
      state.rooms.forEach(room => roomAuditorIds(room).forEach(auditorId => {
        const monthCells = [];
        const routeScores = [];
        const controlScores = [];
        const kpis = [];
        let missed = 0;
        REPORT_MONTHS.forEach((_, monthIndex) => {
          const keys = isWeekly(room.periodicity) ? monthWeekKeys(year, monthIndex) : [`${year}-${pad2(monthIndex + 1)}`];
          const results = keys.map(periodKey => reportPeriod(room, auditorId, periodKey));
          const scores = results.map(result => result.routeScore).filter(Number.isFinite);
          const monthMissed = results.filter(result => result.missed).length;
          const avg = scores.length ? Math.round(scores.reduce((sum, score) => sum + score, 0) / scores.length * 10) / 10 : null;
          monthCells.push(avg ?? (monthMissed ? "Не пройден" : "—"));
          routeScores.push(...scores);
          controlScores.push(...results.map(result => result.controlScore).filter(Number.isFinite));
          kpis.push(...results.map(result => result.kpi).filter(Number.isFinite));
          missed += monthMissed;
        });
        const avg = values => values.length ? Math.round(values.reduce((sum, value) => sum + value, 0) / values.length * 10) / 10 : "";
        rows.push([
          room.name,
          room.number || room.sourceObject,
          room.checklist,
          periodicityLabel(room.periodicity),
          user(auditorId)?.name || auditorId,
          ...monthCells,
          avg(routeScores),
          avg(controlScores),
          avg(kpis),
          missed || ""
        ]);
      }));
      return rows;
    }
    const EXCEL_AUDITOR_FILL = { type: "pattern", pattern: "solid", fgColor: { argb: "FFE2F0D9" } };
    const EXCEL_CONTROL_FILL = { type: "pattern", pattern: "solid", fgColor: { argb: "FFDDEBF7" } };
    const EXCEL_KPI_FILL = { type: "pattern", pattern: "solid", fgColor: { argb: "FFFFF2CC" } };
    function styleExcelSheet(sheet, widths, colorColumns = []) {
      sheet.columns = widths.map(width => ({ width }));
      sheet.views = [{ state: "frozen", ySplit: 3 }];
      const title = sheet.getCell(1, 1);
      title.font = { bold: true, size: 14, color: { argb: "FF0F3F2C" } };
      const header = sheet.getRow(3);
      header.height = 34;
      header.font = { bold: true, color: { argb: "FF10241B" } };
      header.alignment = { vertical: "middle", horizontal: "center", wrapText: true };
      header.eachCell(cell => {
        cell.fill = { type: "pattern", pattern: "solid", fgColor: { argb: "FFF3F6F1" } };
        cell.border = { bottom: { style: "thin", color: { argb: "FFD9E2DC" } } };
      });
      sheet.eachRow((row, rowNumber) => {
        row.eachCell(cell => {
          cell.alignment = { vertical: "top", wrapText: true };
          if (rowNumber >= 4) {
            cell.border = { bottom: { style: "hair", color: { argb: "FFE4ECE7" } } };
          }
        });
      });
      colorColumns.forEach(({ index, fill }) => {
        const column = index + 1;
        sheet.getCell(3, column).fill = fill;
        for (let row = 4; row <= sheet.rowCount; row++) {
          sheet.getCell(row, column).fill = fill;
        }
      });
      if (sheet.rowCount >= 3) {
        sheet.autoFilter = {
          from: { row: 3, column: 1 },
          to: { row: Math.max(3, sheet.rowCount), column: sheet.getRow(3).cellCount }
        };
      }
    }
    function addExcelSheet(workbook, name, rows, widths, colorColumns = []) {
      const sheet = workbook.addWorksheet(name);
      rows.forEach(row => sheet.addRow(row));
      styleExcelSheet(sheet, widths, colorColumns);
      return sheet;
    }
    async function downloadExcelWorkbook(workbook, filename) {
      const buffer = await workbook.xlsx.writeBuffer();
      const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    async function exportYearExcel() {
      if (typeof ExcelJS === "undefined") return toast("Не удалось загрузить модуль Excel. Проверьте интернет и повторите попытку");
      const year = SCHEDULE_NOW.getFullYear();
      const workbook = new ExcelJS.Workbook();
      workbook.creator = "СТИЛ 5С";
      workbook.created = new Date();
      const annual = annualSummaryRows(year);
      addExcelSheet(
        workbook,
        "Годовая сводка",
        annual,
        [34, 14, 24, 16, 30, ...REPORT_MONTHS.map(() => 13), 18, 24, 16, 12],
        [
          { index: 4, fill: EXCEL_AUDITOR_FILL },
          ...REPORT_MONTHS.map((_, index) => ({ index: 5 + index, fill: EXCEL_AUDITOR_FILL })),
          { index: 17, fill: EXCEL_AUDITOR_FILL },
          { index: 18, fill: EXCEL_CONTROL_FILL },
          { index: 19, fill: EXCEL_KPI_FILL }
        ]
      );
      REPORT_MONTHS.forEach((month, monthIndex) => {
        const { weeks, rows } = reportRowsForMonth(year, monthIndex);
        const header = ["Помещение", "Номер", "Тип", "Периодичность", "Аудитор"];
        weeks.forEach((periodKey, index) => header.push(`Неделя ${index + 1}: аудитор\n${weekLabel(periodKey)}`, `Неделя ${index + 1}: контроль`, `Неделя ${index + 1}: КПЭ, %`));
        header.push("За месяц: аудитор", "За месяц: контроль", "За месяц: КПЭ, %", "Пропуски", "Замечания");
        const title = [`${month} ${year}: оценки по неделям и пропуски`];
        const sheetRows = [title, [], header, ...rows];
        const widths = [34, 14, 24, 16, 30, ...weeks.flatMap(() => [20, 18, 14]), 18, 18, 14, 10, 54];
        const colors = [{ index: 4, fill: EXCEL_AUDITOR_FILL }];
        weeks.forEach((_, index) => {
          const base = 5 + index * 3;
          colors.push({ index: base, fill: EXCEL_AUDITOR_FILL });
          colors.push({ index: base + 1, fill: EXCEL_CONTROL_FILL });
          colors.push({ index: base + 2, fill: EXCEL_KPI_FILL });
        });
        const monthBase = 5 + weeks.length * 3;
        colors.push({ index: monthBase, fill: EXCEL_AUDITOR_FILL });
        colors.push({ index: monthBase + 1, fill: EXCEL_CONTROL_FILL });
        colors.push({ index: monthBase + 2, fill: EXCEL_KPI_FILL });
        addExcelSheet(workbook, month, sheetRows, widths, colors);
      });
      await downloadExcelWorkbook(workbook, `Аудиты_5С_${year}.xlsx`);
      toast(`Годовой отчёт за ${year} год выгружен`);
    }

    render();
    restoreSharedSession();
  </script>
